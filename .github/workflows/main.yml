name: Java CI with Gradle (iBank)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start SUT in test mode
        run: java -jar ./artifacts/app-ibank.jar -P:profile=test &

      - name: Wait for SUT to be ready
        run: |
          echo "Waiting for SUT on port 9999..."
          while ! (echo > /dev/tcp/localhost/9999) &>/dev/null; do
            sleep 1
          done
          echo "SUT is ready"

      - name: Build and run tests with Gradle
        run: ./gradlew test --info -Dselenide.headless=true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
